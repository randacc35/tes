// ── INDEXEDDB OFFLINE QUEUE ───────────────────────────────────────────────────
let _idb = null;
function openDB() {
  return new Promise((res, rej) => {
    if (_idb) return res(_idb);
    const r = indexedDB.open('ssa_offline', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('queue', { keyPath: 'id', autoIncrement: true });
    r.onsuccess = e => { _idb = e.target.result; res(_idb); };
    r.onerror = () => rej(r.error);
  });
}
async function enqueue(op) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('queue', 'readwrite');
    tx.objectStore('queue').add({ ...op, ts: Date.now() });
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
async function dequeueAll() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('queue', 'readonly');
    const r = tx.objectStore('queue').getAll();
    r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
  });
}
async function clearQueue() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('queue', 'readwrite');
    tx.objectStore('queue').clear();
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}

// ── SUPABASE HELPERS ──────────────────────────────────────────────────────────
async function sbUpsert(table, row) {
  const { error } = await sb.from(table).upsert(row, { onConflict: 'id' });
  if (error) throw error;
}
async function sbDelete(table, id) {
  const { error } = await sb.from(table).delete().eq('id', id);
  if (error) throw error;
}
async function sbSelect(table, officerId) {
  const { data, error } = await sb.from(table).select('*').eq('officer_id', officerId).order('created_at', { ascending: false });
  if (error) throw error;
  return data || [];
}
async function flushQueue() {
  const ops = await dequeueAll();
  if (!ops.length) return 0;
  for (const op of ops) {
    if (op.action === 'upsert') await sbUpsert(op.table, op.row);
    else if (op.action === 'delete') await sbDelete(op.table, op.id);
  }
  await clearQueue();
  return ops.length;
}

const LS = {
  get: (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  del: (k) => { try { localStorage.removeItem(k); } catch {} },
};

// ── INITIAL STATE ─────────────────────────────────────────────────────────────
const INIT = {
  profile: LS.get('ssa_profile', null),
  authUser: null,
  clients: LS.get('ssa_clients', []),
  pathCases: LS.get('ssa_path', []),
  grants: LS.get('ssa_grants', []),
  deliveries: LS.get('ssa_deliveries', []),
  postOffices: LS.get('ssa_postoffices', []),
  syncPending: 0,
  online: navigator.onLine,
  syncing: false,
};

// ── REDUCER ───────────────────────────────────────────────────────────────────
function reducer(state, action) {
  let s = state;
  switch (action.type) {
    case 'SET_PROFILE':   s = { ...state, profile: action.p }; LS.set('ssa_profile', action.p); break;
    case 'SET_AUTH':      s = { ...state, authUser: action.p }; break;
    case 'SET_ONLINE':    s = { ...state, online: action.p }; break;
    case 'SET_SYNCING':   s = { ...state, syncing: action.p }; break;
    case 'SET_PENDING':   s = { ...state, syncPending: action.p }; break;
    case 'LOAD_ALL':
      s = { ...state, clients: action.clients, pathCases: action.path, grants: action.grants, deliveries: action.deliveries, postOffices: action.pos };
      LS.set('ssa_clients', action.clients); LS.set('ssa_path', action.path);
      LS.set('ssa_grants', action.grants); LS.set('ssa_deliveries', action.deliveries);
      LS.set('ssa_postoffices', action.pos);
      break;
    case 'ADD_CLIENT':    { const a = [action.p, ...state.clients]; s = { ...state, clients: a }; LS.set('ssa_clients', a); break; }
    case 'UPD_CLIENT':    { const a = state.clients.map(x => x.id===action.p.id ? action.p : x); s = { ...state, clients: a }; LS.set('ssa_clients', a); break; }
    case 'DEL_CLIENT':    { const a = state.clients.filter(x => x.id!==action.p); s = { ...state, clients: a }; LS.set('ssa_clients', a); break; }
    case 'ADD_PATH':      { const a = [action.p, ...state.pathCases]; s = { ...state, pathCases: a }; LS.set('ssa_path', a); break; }
    case 'UPD_PATH':      { const a = state.pathCases.map(x => x.id===action.p.id ? action.p : x); s = { ...state, pathCases: a }; LS.set('ssa_path', a); break; }
    case 'DEL_PATH':      { const a = state.pathCases.filter(x => x.id!==action.p); s = { ...state, pathCases: a }; LS.set('ssa_path', a); break; }
    case 'ADD_GRANT':     { const a = [action.p, ...state.grants]; s = { ...state, grants: a }; LS.set('ssa_grants', a); break; }
    case 'UPD_GRANT':     { const a = state.grants.map(x => x.id===action.p.id ? action.p : x); s = { ...state, grants: a }; LS.set('ssa_grants', a); break; }
    case 'DEL_GRANT':     { const a = state.grants.filter(x => x.id!==action.p); s = { ...state, grants: a }; LS.set('ssa_grants', a); break; }
    case 'ADD_DEL':       { const a = [action.p, ...state.deliveries]; s = { ...state, deliveries: a }; LS.set('ssa_deliveries', a); break; }
    case 'UPD_DEL':       { const a = state.deliveries.map(x => x.id===action.p.id ? action.p : x); s = { ...state, deliveries: a }; LS.set('ssa_deliveries', a); break; }
    case 'DEL_DEL':       { const a = state.deliveries.filter(x => x.id!==action.p); s = { ...state, deliveries: a }; LS.set('ssa_deliveries', a); break; }
    case 'ADD_PO':        { const a = [...state.postOffices, action.p]; s = { ...state, postOffices: a }; LS.set('ssa_postoffices', a); break; }
    case 'DEL_PO':        { const a = state.postOffices.filter(x => x.id!==action.p); s = { ...state, postOffices: a }; LS.set('ssa_postoffices', a); break; }
    case 'RESET':
      ['ssa_profile','ssa_clients','ssa_path','ssa_grants','ssa_deliveries','ssa_postoffices'].forEach(k => LS.del(k));
      s = { ...INIT, profile:null, authUser:state.authUser, clients:[], pathCases:[], grants:[], deliveries:[], postOffices:[] };
      break;
    default: return state;
  }
  return s;
}

// ── SYNC HOOK ─────────────────────────────────────────────────────────────────
function useSync(state, dispatch) {
  const oid = state.authUser?.id;

  const writeOp = useCallback(async (action, table, row, id) => {
    const online = navigator.onLine;
    if (action === 'upsert') {
      const fullRow = { ...row, officer_id: oid, updated_at: new Date().toISOString() };
      if (online) { try { await sbUpsert(table, fullRow); return; } catch(e) { console.warn('write failed, queuing', e); } }
      await enqueue({ action:'upsert', table, row: fullRow });
    } else {
      if (online) { try { await sbDelete(table, id); return; } catch(e) { console.warn('delete failed, queuing', e); } }
      await enqueue({ action:'delete', table, id });
    }
    const q = await dequeueAll();
    dispatch({ type:'SET_PENDING', p: q.length });
  }, [oid]);

  const pull = useCallback(async () => {
    if (!navigator.onLine || !oid) return;
    const [clients, path, grants, deliveries, pos] = await Promise.all([
      sbSelect('ssa_clients', oid), sbSelect('ssa_path_cases', oid),
      sbSelect('ssa_grants', oid), sbSelect('ssa_deliveries', oid),
      sbSelect('ssa_post_offices', oid),
    ]);
    dispatch({ type:'LOAD_ALL', clients, path, grants, deliveries, pos });
  }, [oid]);

  const syncNow = useCallback(async () => {
    if (!navigator.onLine) return;
    dispatch({ type:'SET_SYNCING', p:true });
    try { await flushQueue(); dispatch({ type:'SET_PENDING', p:0 }); await pull(); } catch(e) { console.warn('sync err', e); }
    dispatch({ type:'SET_SYNCING', p:false });
  }, [pull]);

  useEffect(() => {
    const up = () => { dispatch({ type:'SET_ONLINE', p:true }); syncNow(); };
    const dn = () => dispatch({ type:'SET_ONLINE', p:false });
    window.addEventListener('online', up);
    window.addEventListener('offline', dn);
    return () => { window.removeEventListener('online', up); window.removeEventListener('offline', dn); };
  }, [syncNow]);

  useEffect(() => { if (oid) pull(); }, [oid]);
  useEffect(() => { dequeueAll().then(q => dispatch({ type:'SET_PENDING', p:q.length })); }, []);

  return { writeOp, syncNow };
}

// ── SYNC DISPATCH ──────────────────────────────────────────────────────────────
function useSyncDispatch(dispatch, writeOp) {
  return useCallback(action => {
    dispatch(action);
    const TABLE_MAP = {
      ADD_CLIENT:['upsert','ssa_clients'], UPD_CLIENT:['upsert','ssa_clients'], DEL_CLIENT:['delete','ssa_clients'],
      ADD_PATH:['upsert','ssa_path_cases'], UPD_PATH:['upsert','ssa_path_cases'], DEL_PATH:['delete','ssa_path_cases'],
      ADD_GRANT:['upsert','ssa_grants'], UPD_GRANT:['upsert','ssa_grants'], DEL_GRANT:['delete','ssa_grants'],
      ADD_DEL:['upsert','ssa_deliveries'], UPD_DEL:['upsert','ssa_deliveries'], DEL_DEL:['delete','ssa_deliveries'],
      ADD_PO:['upsert','ssa_post_offices'], DEL_PO:['delete','ssa_post_offices'],
    };
    const m = TABLE_MAP[action.type];
    if (!m) return;
    const [op, table] = m;
    if (op === 'upsert') writeOp('upsert', table, action.p);
    else writeOp('delete', table, null, action.p);
  }, [dispatch, writeOp]);
}

function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [msg, setMsg] = useState('');

  const handle = async () => {
    setLoading(true); setErr(''); setMsg('');
    try {
      if (mode==='login') {
        const { data, error } = await sb.auth.signInWithPassword({ email, password:pass });
        if (error) throw error;
        onAuth(data.user);
      } else {
        const { data, error } = await sb.auth.signUp({ email, password:pass });
        if (error) throw error;
        if (data.user && !data.user.email_confirmed_at) setMsg('Check your email to confirm your account, then sign in.');
        else onAuth(data.user);
      }
    } catch(e) { setErr(e.message||'An error occurred'); }
    setLoading(false);
  };

  return (
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:C.surface,borderRadius:16,padding:32,width:'100%',maxWidth:400,boxShadow:'0 4px 32px #0002'}}>
        <div style={{textAlign:'center',marginBottom:28}}>

          <p style={{fontSize:13,color:C.textMuted}}>MLSS Jamaica · Social Services Assistant</p>
        </div>
        <div style={{display:'flex',marginBottom:20,background:C.bg,borderRadius:8,padding:4}}>
          {['login','signup'].map(m=><button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:'8px',border:'none',borderRadius:6,background:mode===m?C.surface:'transparent',fontWeight:mode===m?700:400,color:mode===m?C.primary:C.textMuted,cursor:'pointer',fontSize:13}}>{m==='login'?'Sign In':'Create Account'}</button>)}
        </div>
        {err&&<div style={{background:'#FEF2F2',border:`1px solid ${C.danger}44`,borderRadius:8,padding:'10px 12px',marginBottom:14,fontSize:13,color:C.danger}}>{err}</div>}

          {loading?'Please wait…':mode==='login'?<><Icon name="logIn" size={16}/> Sign In</>:<><Icon name="user" size={16}/> Create Account</>}
        </Btn>
        <p style={{textAlign:'center',marginTop:14,fontSize:12,color:C.textMuted}}>Works offline · Data syncs automatically when online</p>

  );

// ── DELIVERIES ────────────────────────────────────────────────────────────────
function DeliveriesModule({ state, dispatch }) {
  const [view,setView]=useState('list'); const [sel,setSel]=useState(null);
  const [conf,setConf]=useState(null); const [fSt,setFSt]=useState('');
  const filt=state.deliveries.filter(d=>!fSt||d.status===fSt);
  const save=d=>{dispatch(d.id?{type:'UPD_DEL',p:d}:{type:'ADD_DEL',p:{...d,id:uid(),created_at:new Date().toISOString()}});setView('list');setSel(null);};
  if(view==='form') return <DeliveryForm delivery={sel} postOffices={state.postOffices} onSave={save} onCancel={()=>{setView('list');setSel(null);}}/>;
  if(view==='detail'&&sel){const latest=state.deliveries.find(d=>d.id===sel.id)||sel;return <DeliveryDetail delivery={latest} onEdit={()=>{setSel(latest);setView('form');}} onDelete={()=>setConf(latest.id)} onBack={()=>{setView('list');setSel(null);}} onDeliver={()=>dispatch({type:'UPD_DEL',p:{...latest,status:'Delivered',delivered_at:today()}})}/>;}
  return (
    <div style={{padding:'16px 16px 100px'}}>
      {conf&&<Confirm message="Delete this delivery record?" onConfirm={()=>{dispatch({type:'DEL_DEL',p:conf});setConf(null);setView('list');setSel(null);}} onCancel={()=>setConf(null)}/>}

  );

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function CalendarModule({ state }) {
  const [cur,setCur]=useState(new Date()); const [selDay,setSelDay]=useState(null);
  const yr=cur.getFullYear(), mo=cur.getMonth();
  const firstDay=new Date(yr,mo,1).getDay(), days=new Date(yr,mo+1,0).getDate();
  const evts={};
  const add=(ds,type,label)=>{if(!ds)return;const d=ds.slice(0,10);if(!evts[d])evts[d]=[];evts[d].push({type,label});};
  state.pathCases.forEach(p=>{add(g(p,'visit_date','visitDate'),'path',g(p,'client_name','clientName'));add(g(p,'assigned_date','assignedDate'),'path-a',g(p,'client_name','clientName'));});
  state.grants.forEach(gr=>add(g(gr,'assigned_date','assignedDate'),'grant',g(gr,'client_name','clientName')));
  state.deliveries.forEach(d=>add(g(d,'delivery_date','deliveryDate'),'del',g(d,'post_office','postOffice')));
  const selKey=selDay?`${yr}-${String(mo+1).padStart(2,'0')}-${String(selDay).padStart(2,'0')}`:null;
  const selEvts=selKey?(evts[selKey]||[]):[];
  const tc={path:C.primary,'path-a':C.primaryLight,grant:C.accent,del:C.success};
  const tl={path:'PATH Visit','path-a':'PATH Assigned',grant:'Grant',del:'Delivery'};
  return (
    <div style={{padding:'16px 16px 100px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <button onClick={()=>setCur(new Date(yr,mo-1,1))} style={{background:'none',border:'none',cursor:'pointer',padding:8}}><Icon name="chevronLeft" size={20} color={C.primary}/></button>
        <h2 style={{fontSize:18,color:C.primaryDark}}>{cur.toLocaleString('default',{month:'long'})} {yr}</h2>
        <button onClick={()=>setCur(new Date(yr,mo+1,1))} style={{background:'none',border:'none',cursor:'pointer',padding:8}}><Icon name="chevronRight" size={20} color={C.primary}/></button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
        {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div key={d} style={{textAlign:'center',fontSize:11,fontWeight:700,color:C.textMuted,padding:'4px 0'}}>{d}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {Array(firstDay).fill(null).map((_,i)=><div key={`e${i}`}/>)}
        {Array(days).fill(null).map((_,i)=>{
          const day=i+1, key=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const de=evts[key]||[], isT=key===today(), isSel=day===selDay;
          return <div key={day} onClick={()=>setSelDay(day===selDay?null:day)} style={{minHeight:44,padding:'4px 2px',textAlign:'center',cursor:'pointer',borderRadius:8,background:isSel?C.primaryLight:isT?C.primary+'18':'transparent',border:isT?`1px solid ${C.primary}`:'1px solid transparent'}}>
            <div style={{fontSize:13,fontWeight:isT?700:400,color:isT?C.primary:C.text}}>{day}</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:2,justifyContent:'center'}}>{de.slice(0,3).map((e,idx)=><div key={idx} style={{width:6,height:6,borderRadius:'50%',background:tc[e.type]||C.textMuted}}/>)}</div>
          </div>;
        })}
      </div>
      {selDay&&<div style={{marginTop:20}}><h3 style={{fontSize:14,fontWeight:600,marginBottom:10}}>{fmtDate(selKey)}</h3>{selEvts.length===0?<p style={{fontSize:13,color:C.textMuted}}>No events</p>:selEvts.map((e,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,marginBottom:6}}><div style={{width:10,height:10,borderRadius:'50%',background:tc[e.type],flexShrink:0}}/><div><div style={{fontSize:13,fontWeight:600}}>{e.label}</div><div style={{fontSize:11,color:C.textMuted}}>{tl[e.type]}</div></div></div>)}</div>}
      <div style={{display:'flex',gap:12,flexWrap:'wrap',marginTop:20}}>{Object.entries(tl).map(([k,l])=><div key={k} style={{display:'flex',alignItems:'center',gap:6,fontSize:12}}><div style={{width:8,height:8,borderRadius:'50%',background:tc[k]}}/>{l}</div>)}</div>
    </div>
  );
}

  const now=new Date(), tm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

      </Sec>
      <Sec title="Grants by Type">
        {GRANT_TYPES.map(t=>{const cnt=grants.filter(gr=>g(gr,'grant_type','grantType')===t).length;return cnt?<div key={t} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><span style={{fontSize:13}}>{t}</span><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:Math.max(cnt*20,4),height:8,background:C.accent,borderRadius:4}}/><span style={{fontSize:13,fontWeight:700,color:C.accent,minWidth:20}}>{cnt}</span></div></div>:null;})}
      </Sec>
      <Sec title="Deliveries">
        {[['Pending',C.warning],['Delivered',C.success]].map(([s,c])=><div key={s} style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span style={{fontSize:13}}>{s}</span><span style={{fontSize:13,fontWeight:700,color:c}}>{deliveries.filter(d=>d.status===s).length}</span></div>)}
      </Sec>
    </div>
  );
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function SettingsModule({ state, dispatch, onSignOut, syncNow }) {
  const [prof,setProf]=useState(state.profile); const [saved,setSaved]=useState(false);
  const [newPO,setNewPO]=useState(''); const [confReset,setConfReset]=useState(false);
  const set=k=>v=>setProf(p=>({...p,[k]:v}));
  const save=()=>{dispatch({type:'SET_PROFILE',p:prof});setSaved(true);setTimeout(()=>setSaved(false),2000);};
  return (
    <div style={{padding:'16px 16px 100px'}}>
      {confReset&&<Confirm message="Reset all local data? Your Supabase data remains." onConfirm={()=>{dispatch({type:'RESET'});setConfReset(false);}} onCancel={()=>setConfReset(false)}/>}
      <h2 style={{fontSize:20,color:C.primaryDark,marginBottom:16}}>Settings</h2>
      <Card style={{marginBottom:14,background:C.primaryLight}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div><div style={{fontSize:13,fontWeight:600,color:C.primaryDark}}>{state.authUser?.email}</div><div style={{fontSize:11,color:C.textMuted}}>Signed in</div></div>
          <Btn size="sm" variant="ghost" onClick={onSignOut}><Icon name="logOut" size={14}/> Sign Out</Btn>
        </div>
      </Card>
      <Card style={{marginBottom:14,background:state.online?'#F0FDF4':'#FEF2F2'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}><span className="online-dot" style={{background:state.online?C.success:C.danger}}/><div><div style={{fontSize:13,fontWeight:600,color:state.online?C.success:C.danger}}>{state.online?'Online':'Offline'}</div>{state.syncPending>0&&<div style={{fontSize:11,color:C.warning}}>{state.syncPending} pending</div>}</div></div>
          {state.online&&<Btn size="sm" variant="secondary" onClick={syncNow} disabled={state.syncing}><Icon name="refreshCw" size={14}/> {state.syncing?'Syncing…':'Sync Now'}</Btn>}
        </div>
      </Card>
      <h3 style={{fontSize:13,color:C.textMuted,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>Officer Profile</h3>
      <Card style={{marginBottom:14}}>
        <Field label="Full Name"><Inp value={prof.name} onChange={set('name')}/></Field>
        <Field label="Employee ID"><Inp value={prof.employeeId} onChange={set('employeeId')}/></Field>
        <Field label="Role"><Inp value={prof.role} onChange={set('role')}/></Field>
        <Field label="Zone Code"><Inp value={prof.zone} onChange={set('zone')}/></Field>
        <Field label="Zone Name"><Inp value={prof.zoneName} onChange={set('zoneName')}/></Field>
        <Field label="Parish"><Inp value={prof.parish} onChange={set('parish')}/></Field>
        <Field label="Phone"><Inp value={prof.phone} onChange={set('phone')}/></Field>
        <Field label="Email"><Inp value={prof.email} onChange={set('email')} type="email"/></Field>
        <div style={{display:'flex',alignItems:'center',gap:10}}><Btn onClick={save}>Save Profile</Btn>{saved&&<span style={{color:C.success,fontSize:13,display:'flex',alignItems:'center',gap:4}}><Icon name="checkCircle" size={16} color={C.success}/> Saved</span>}</div>
      </Card>
      <h3 style={{fontSize:13,color:C.textMuted,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>Post Offices</h3>
      <Card style={{marginBottom:14}}>
        <div style={{display:'flex',gap:8,marginBottom:12}}><Inp value={newPO} onChange={setNewPO} placeholder="Post office name"/><Btn size="sm" onClick={()=>{if(newPO.trim()){dispatch({type:'ADD_PO',p:{id:uid(),name:newPO.trim()}});setNewPO('');}}}>Add</Btn></div>
        {state.postOffices.length===0&&<p style={{fontSize:13,color:C.textMuted}}>No post offices yet.</p>}
        {state.postOffices.map(po=><div key={po.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}><span style={{fontSize:14}}>{po.name}</span><button onClick={()=>dispatch({type:'DEL_PO',p:po.id})} style={{background:'none',border:'none',cursor:'pointer',color:C.danger,padding:4}}><Icon name="trash" size={15}/></button></div>)}
      </Card>
      <h3 style={{fontSize:13,color:C.textMuted,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>Data</h3>
      <Card><p style={{fontSize:13,color:C.textMuted,marginBottom:10}}>Clears local cache only. Supabase data is preserved.</p><Btn variant="danger" onClick={()=>setConfReset(true)}><Icon name="trash" size={15}/> Reset Local Data</Btn></Card>
    </div>
  );
}

// ── MAP MODULE ────────────────────────────────────────────────────────────────
function MapModule({ state }) {
  const mapRef = useRef(null);
  const leafletMap = useRef(null);
  const markersLayer = useRef(null);
  const routeLayer = useRef(null);
  const userMarker = useRef(null);
  const watchId = useRef(null);
  const [userPos, setUserPos] = useState(null);
  const [gpsStatus, setGpsStatus] = useState('idle'); // idle|watching|error
  const [activeCase, setActiveCase] = useState(null); // {id, label, address, lat, lng, type}
  const [navigating, setNavigating] = useState(false);
  const [geocoding, setGeocoding] = useState(false);
  const [filter, setFilter] = useState('all'); // all|path|grants|deliveries|clients
  const [mapLayer, setMapLayer] = useState('street'); // street|satellite
  const [pendingGeocode, setPendingGeocode] = useState([]);
  const [geocodeCache, setGeocodeCache] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ssa_geocache') || '{}'); } catch { return {}; }
  });
  const tileLayerRef = useRef(null);

  // Build unified case list from all modules
  const allCases = React.useMemo(() => {
    const list = [];
    (state.pathCases || []).forEach(p => {
      const addr = p.residential_address || p.community || '';
      if (addr) list.push({ id: p.id, type: 'path', label: g(p,'client_name','clientName') || 'PATH Case', address: addr, community: p.community || '', status: p.status, sub: g(p,'case_type','caseType') || 'PATH' });
    });
    (state.grants || []).forEach(gr => {
      const addr = gr.residential_address || gr.community || '';
      if (addr) list.push({ id: gr.id, type: 'grant', label: g(gr,'client_name','clientName') || 'Grant', address: addr, community: gr.community || '', status: gr.status, sub: g(gr,'grant_type','grantType') || 'Grant' });
    });
    (state.deliveries || []).forEach(d => {
      const addr = g(d,'post_office','postOffice') || '';
      if (addr) list.push({ id: d.id, type: 'delivery', label: g(d,'client_name','clientName') || 'Delivery', address: addr, community: addr, status: d.status, sub: 'Delivery' });
    });
    (state.clients || []).forEach(cl => {
      const addr = cl.address || cl.community || '';
      if (addr) list.push({ id: cl.id, type: 'client', label: cl.name || 'Client', address: addr, community: cl.community || '', status: '', sub: 'Client' });
    });
    return list;
  }, [state.pathCases, state.grants, state.deliveries, state.clients]);

  const filtered = filter === 'all' ? allCases : allCases.filter(c => c.type === filter || (filter === 'path' && c.type === 'path'));

  const typeColor = { path: C.primary, grant: C.accent, delivery: C.success, client: C.info };
  const typeLabel = { path: 'PATH', grant: 'Grant', delivery: 'Delivery', client: 'Client' };

  // Geocode an address using Nominatim (respects offline cache)
  const geocodeAddress = useCallback(async (address, parish) => {
    const key = (address + (parish || '')).toLowerCase().replace(/\s+/g, ' ').trim();
    if (geocodeCache[key]) return geocodeCache[key];
    const q = encodeURIComponent(`${address}, ${parish || 'Jamaica'}`);
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=1&countrycodes=jm`, { headers: { 'Accept-Language': 'en' } });
      const data = await r.json();
      if (data && data[0]) {
        const result = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), display: data[0].display_name };
        const newCache = { ...geocodeCache, [key]: result };
        setGeocodeCache(newCache);
        localStorage.setItem('ssa_geocache', JSON.stringify(newCache));
        return result;
      }
    } catch (e) {}
    return null;
  }, [geocodeCache]);

  // Initialise Leaflet map
  useEffect(() => {
    if (!mapRef.current || leafletMap.current) return;
    const map = L.map(mapRef.current, { zoomControl: false, attributionControl: true }).setView([17.9, -76.8], 11);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    tileLayerRef.current = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors', maxZoom: 19
    }).addTo(map);
    markersLayer.current = L.layerGroup().addTo(map);
    routeLayer.current = L.layerGroup().addTo(map);
    leafletMap.current = map;
    return () => { map.remove(); leafletMap.current = null; };
  }, []);

  // Switch tile layer
  useEffect(() => {
    if (!leafletMap.current || !tileLayerRef.current) return;
    leafletMap.current.removeLayer(tileLayerRef.current);
    const url = mapLayer === 'satellite'
      ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
      : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
    tileLayerRef.current = L.tileLayer(url, { maxZoom: 19, attribution: mapLayer === 'satellite' ? '© Esri' : '© OpenStreetMap contributors' }).addTo(leafletMap.current);
  }, [mapLayer]);

  // Render markers whenever filtered list or geocodeCache changes
  useEffect(() => {
    if (!leafletMap.current || !markersLayer.current) return;
    markersLayer.current.clearLayers();
    const bounds = [];
    filtered.forEach(c => {
      const key = (c.address + (state.profile?.parish || '')).toLowerCase().replace(/\s+/g, ' ').trim();
      const coords = geocodeCache[key];
      if (!coords) return;
      const color = typeColor[c.type] || C.primary;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36"><path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 22 14 22S28 24.5 28 14C28 6.27 21.73 0 14 0z" fill="${color}"/><circle cx="14" cy="14" r="6" fill="white"/></svg>`;
      const icon = L.divIcon({ html: svg, iconSize: [28, 36], iconAnchor: [14, 36], popupAnchor: [0, -36], className: '' });
      const marker = L.marker([coords.lat, coords.lng], { icon });
      const popup = `<div style="padding:12px;min-width:180px;font-family:'DM Sans',sans-serif">
        <div style="font-size:11px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${typeLabel[c.type]}</div>
        <div style="font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:2px">${c.label}</div>
        <div style="font-size:12px;color:#6b7280;margin-bottom:8px">${c.address}</div>
        ${c.status ? `<div style="display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:${color}22;color:${color};margin-bottom:8px">${c.status}</div>` : ''}
        <div style="display:flex;gap:8px">
          <button onclick="window._ssaNav('${c.id}')" style="flex:1;padding:6px;background:${color};color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">▶ Navigate</button>
        </div>
      </div>`;
      marker.bindPopup(popup, { className: 'case-popup', maxWidth: 240 });
      marker.on('click', () => setActiveCase({ ...c, lat: coords.lat, lng: coords.lng }));
      markersLayer.current.addLayer(marker);
      bounds.push([coords.lat, coords.lng]);
    });
    if (bounds.length > 0) leafletMap.current.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
  }, [filtered, geocodeCache]);

  // Global nav handler from popup button
  useEffect(() => {
    window._ssaNav = (caseId) => {
      const c = allCases.find(x => x.id === caseId);
      if (c) startNavigation(c);
    };
    return () => { delete window._ssaNav; };
  }, [allCases]);

  // Geocode pending cases when online
  useEffect(() => {
    if (!state.online || filtered.length === 0) return;
    const missing = filtered.filter(c => {
      const key = (c.address + (state.profile?.parish || '')).toLowerCase().replace(/\s+/g, ' ').trim();
      return !geocodeCache[key];
    });
    if (missing.length === 0) return;
    setPendingGeocode(missing.map(m => m.id));
    setGeocoding(true);
    (async () => {
      for (const c of missing) {
        await geocodeAddress(c.address, state.profile?.parish || 'Jamaica');
        await new Promise(r => setTimeout(r, 350)); // Nominatim rate limit
        setPendingGeocode(prev => prev.filter(id => id !== c.id));
      }
      setGeocoding(false);
    })();
  }, [filtered.length, state.online]);

  // GPS tracking
  const startGPS = useCallback(() => {
    if (!navigator.geolocation) { setGpsStatus('error'); return; }
    setGpsStatus('watching');
    watchId.current = navigator.geolocation.watchPosition(
      pos => {
        const { latitude: lat, longitude: lng, accuracy } = pos.coords;
        setUserPos({ lat, lng, accuracy });
        if (leafletMap.current) {
          if (!userMarker.current) {
            const svg = `<div style="width:20px;height:20px;border-radius:50%;background:#2563EB;border:3px solid white;box-shadow:0 2px 8px #0004"></div>`;
            const icon = L.divIcon({ html: svg, iconSize: [20, 20], iconAnchor: [10, 10], className: '' });
            userMarker.current = L.marker([lat, lng], { icon, zIndexOffset: 1000 }).addTo(leafletMap.current);
          } else {
            userMarker.current.setLatLng([lat, lng]);
          }
          if (!navigating) leafletMap.current.setView([lat, lng], 14, { animate: true });
        }
      },
      err => { console.warn('GPS error', err); setGpsStatus('error'); },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
    );
  }, [navigating]);

  const stopGPS = useCallback(() => {
    if (watchId.current) navigator.geolocation.clearWatch(watchId.current);
    watchId.current = null;
    if (userMarker.current && leafletMap.current) { leafletMap.current.removeLayer(userMarker.current); userMarker.current = null; }
    setGpsStatus('idle');
    setUserPos(null);
    setNavigating(false);
    if (routeLayer.current) routeLayer.current.clearLayers();
  }, []);

  // Draw straight-line route (OSRM needs server; use straight line as offline fallback)
  const drawRoute = useCallback(async (from, to) => {
    if (!leafletMap.current || !routeLayer.current) return;
    routeLayer.current.clearLayers();
    // Try OSRM routing (online)
    try {
      const url = `https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`;
      const r = await fetch(url);
      const d = await r.json();
      if (d.routes && d.routes[0]) {
        const line = L.geoJSON(d.routes[0].geometry, { style: { color: C.primary, weight: 5, opacity: 0.8 } });
        routeLayer.current.addLayer(line);
        const dist = (d.routes[0].distance / 1000).toFixed(1);
        const mins = Math.round(d.routes[0].duration / 60);
        L.popup().setLatLng([(from.lat + to.lat) / 2, (from.lng + to.lng) / 2])
          .setContent(`<div style="font-family:'DM Sans',sans-serif;padding:4px;text-align:center"><b>${dist} km</b><br><span style="font-size:12px;color:#6b7280">~${mins} min drive</span></div>`)
          .openOn(leafletMap.current);
        leafletMap.current.fitBounds([[from.lat, from.lng], [to.lat, to.lng]], { padding: [60, 60] });
        return;
      }
    } catch (e) {}
    // Offline fallback — straight dashed line
    const line = L.polyline([[from.lat, from.lng], [to.lat, to.lng]], { color: C.primary, weight: 4, opacity: 0.7, dashArray: '10,8' });
    routeLayer.current.addLayer(line);
    const dist = leafletMap.current.distance([from.lat, from.lng], [to.lat, to.lng]);
    const km = (dist / 1000).toFixed(1);
    L.popup().setLatLng([(from.lat + to.lat) / 2, (from.lng + to.lng) / 2])
      .setContent(`<div style="font-family:'DM Sans',sans-serif;padding:4px;text-align:center"><b>~${km} km</b><br><span style="font-size:12px;color:#6b7280">Straight line (offline)</span></div>`)
      .openOn(leafletMap.current);
    leafletMap.current.fitBounds([[from.lat, from.lng], [to.lat, to.lng]], { padding: [60, 60] });
  }, []);

  const startNavigation = useCallback(async (c) => {
    setActiveCase(c);
    const to = { lat: c.lat, lng: c.lng };
    setNavigating(true);
    if (gpsStatus !== 'watching') startGPS();
    // If we already have GPS pos draw immediately, otherwise wait and draw when available
    if (userPos) {
      await drawRoute(userPos, to);
    } else {
      // Draw route from a rough "current" position after small delay
      setTimeout(async () => {
        if (userPos) await drawRoute(userPos, to);
      }, 3000);
    }
  }, [gpsStatus, userPos, startGPS, drawRoute]);

  // External navigate to Google/Apple Maps
  const openExternalNav = (c) => {
    const url = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(c.address + ', Jamaica')}&travelmode=driving`;
    window.open(url, '_blank');
  };

  const geocodedCount = filtered.filter(c => {
    const key = (c.address + (state.profile?.parish || '')).toLowerCase().replace(/\s+/g, ' ').trim();
    return !!geocodeCache[key];
  }).length;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: 'calc(100vh - 56px - 62px)', overflow: 'hidden', position: 'relative' }}>
      {/* Top controls */}
      <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: '8px 12px', zIndex: 50, flexShrink: 0 }}>
        <div style={{ display: 'flex', gap: 6, overflowX: 'auto', paddingBottom: 4 }}>
          {[['all','All','layers'],['path','PATH','clipboard'],['grant','Grants','gift'],['delivery','Deliveries','truck'],['client','Clients','users']].map(([val, label, icon]) => (
            <button key={val} onClick={() => setFilter(val)} style={{ display: 'flex', alignItems: 'center', gap: 4, padding: '5px 10px', borderRadius: 20, border: `1px solid ${filter === val ? C.primary : C.border}`, background: filter === val ? C.primary : C.surface, color: filter === val ? '#fff' : C.textMuted, fontSize: 12, fontWeight: filter === val ? 700 : 400, cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0 }}>
              <Icon name={icon} size={12} color={filter === val ? '#fff' : C.textMuted} />{label}
            </button>
          ))}
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 6 }}>
          <span style={{ fontSize: 11, color: C.textMuted }}>
            {geocodedCount}/{filtered.length} mapped
            {geocoding && <span style={{ color: C.warning, marginLeft: 6 }} className="nav-pulse">⟳ Geocoding…</span>}
          </span>
          <div style={{ display: 'flex', gap: 6 }}>
            <button onClick={() => setMapLayer(l => l === 'street' ? 'satellite' : 'street')} style={{ padding: '4px 8px', borderRadius: 6, border: `1px solid ${C.border}`, background: C.surface, fontSize: 11, cursor: 'pointer', color: C.textMuted }}>
              {mapLayer === 'street' ? '🛰 Satellite' : '🗺 Street'}
            </button>
            <button onClick={gpsStatus === 'watching' ? stopGPS : startGPS}
              style={{ padding: '4px 8px', borderRadius: 6, border: `1px solid ${gpsStatus === 'watching' ? C.primary : C.border}`, background: gpsStatus === 'watching' ? C.primary : C.surface, fontSize: 11, cursor: 'pointer', color: gpsStatus === 'watching' ? '#fff' : C.textMuted, display: 'flex', alignItems: 'center', gap: 4 }}>
              <Icon name="crosshair" size={12} color={gpsStatus === 'watching' ? '#fff' : C.textMuted} />
              {gpsStatus === 'watching' ? 'GPS On' : gpsStatus === 'error' ? 'GPS Err' : 'GPS'}
            </button>
          </div>
        </div>
      </div>

      {/* Map */}
      <div ref={mapRef} style={{ flex: 1, background: '#e8e0d8' }} />

      {/* No cases notice */}
      {filtered.length === 0 && (
        <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%,-50%)', background: C.surface, borderRadius: 12, padding: '16px 20px', boxShadow: '0 4px 20px #0002', zIndex: 60, textAlign: 'center', maxWidth: 260 }}>
          <Icon name="mapPin" size={32} color={C.border} />
          <p style={{ fontSize: 13, color: C.textMuted, marginTop: 8 }}>No cases with addresses for this filter.</p>
        </div>
      )}

      {/* No geocoded notice */}
      {filtered.length > 0 && geocodedCount === 0 && !geocoding && !state.online && (
        <div style={{ position: 'absolute', top: 100, left: 12, right: 12, background: '#FEF2F2', border: `1px solid ${C.danger}44`, borderRadius: 10, padding: '10px 14px', zIndex: 60, fontSize: 13, color: C.danger, display: 'flex', gap: 8, alignItems: 'center' }}>
          <Icon name="wifiOff" size={16} color={C.danger} />
          Go online to geocode addresses and pin cases on the map.
        </div>
      )}

      {/* Active case navigation panel */}
      {activeCase && (
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, background: C.surface, borderTop: `1px solid ${C.border}`, borderRadius: '16px 16px 0 0', padding: '16px', zIndex: 70, boxShadow: '0 -4px 20px #0002' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'inline-block', padding: '2px 8px', borderRadius: 20, fontSize: 11, fontWeight: 700, background: (typeColor[activeCase.type] || C.primary) + '22', color: typeColor[activeCase.type] || C.primary, marginBottom: 4 }}>
                {typeLabel[activeCase.type] || activeCase.type}
              </div>
              <div style={{ fontSize: 16, fontWeight: 700, color: C.primaryDark }}>{activeCase.label}</div>
              <div style={{ fontSize: 12, color: C.textMuted, marginTop: 2 }}>{activeCase.address}</div>
              {activeCase.status && <div style={{ fontSize: 12, color: C.textMuted, marginTop: 2 }}>Status: {activeCase.status}</div>}
            </div>
            <button onClick={() => { setActiveCase(null); setNavigating(false); if (routeLayer.current) routeLayer.current.clearLayers(); }} style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.textMuted, padding: 4 }}>
              <Icon name="x" size={20} />
            </button>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            {activeCase.lat && (
              <Btn onClick={() => startNavigation(activeCase)} style={{ flex: 1, justifyContent: 'center' }}
                variant={navigating ? 'secondary' : 'primary'}>
                <Icon name="navigation" size={15} color={navigating ? C.primary : '#fff'} />
                {navigating ? 'Reroute' : 'Navigate'}
              </Btn>
            )}
            <Btn onClick={() => openExternalNav(activeCase)} variant="ghost" style={{ flex: 1, justifyContent: 'center' }}>
              <Icon name="mapPin" size={15} color={C.primary} />
              Maps App
            </Btn>
          </div>
          {navigating && userPos && activeCase.lat && (
            <div style={{ marginTop: 10, padding: '8px 12px', background: C.primaryLight, borderRadius: 8, fontSize: 12, color: C.primaryDark, display: 'flex', alignItems: 'center', gap: 6 }}>
              <span className="nav-pulse">📍</span>
              <span>GPS active · Accuracy ±{Math.round(userPos.accuracy || 0)}m</span>
            </div>
          )}
        </div>
      )}

      {/* Case list sidebar (collapsed by default) */}
      <CaseListDrawer cases={filtered} geocodeCache={geocodeCache} profile={state.profile}
        onSelect={c => {
          const key = (c.address + (state.profile?.parish || '')).toLowerCase().replace(/\s+/g, ' ').trim();
          const coords = geocodeCache[key];
          if (coords && leafletMap.current) {
            leafletMap.current.setView([coords.lat, coords.lng], 16, { animate: true });
            setActiveCase({ ...c, lat: coords.lat, lng: coords.lng });
          } else {
            setActiveCase({ ...c, lat: null, lng: null });
          }
        }}
      />
    </div>
  );
}

function CaseListDrawer({ cases, geocodeCache, profile, onSelect }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const typeColor = { path: C.primary, grant: C.accent, delivery: C.success, client: C.info };
  const filtered = cases.filter(c => c.label.toLowerCase().includes(search.toLowerCase()) || c.address.toLowerCase().includes(search.toLowerCase()));
  return (
    <>
      <button onClick={() => setOpen(o => !o)} style={{ position: 'absolute', top: 72, right: 10, zIndex: 65, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: '8px 10px', boxShadow: '0 2px 8px #0002', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5, fontSize: 12, fontWeight: 600, color: C.primaryDark }}>
        <Icon name="route" size={14} color={C.primary} /> {open ? 'Hide' : 'Cases'}
      </button>
      {open && (
        <div style={{ position: 'absolute', top: 72, right: 10, zIndex: 64, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, width: 220, maxHeight: 340, boxShadow: '0 4px 20px #0003', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
          <div style={{ padding: '10px 10px 6px' }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search…" style={{ width: '100%', padding: '6px 10px', border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 13, outline: 'none' }} />
          </div>
          <div style={{ overflowY: 'auto', flex: 1 }}>
            {filtered.length === 0 && <p style={{ fontSize: 12, color: C.textMuted, textAlign: 'center', padding: 16 }}>No cases</p>}
            {filtered.map(c => {
              const key = (c.address + (profile?.parish || '')).toLowerCase().replace(/\s+/g, ' ').trim();
              const hasCoords = !!geocodeCache[key];
              return (
                <div key={c.id} onClick={() => onSelect(c)} style={{ padding: '8px 10px', borderBottom: `1px solid ${C.border}`, cursor: 'pointer', display: 'flex', gap: 8, alignItems: 'flex-start' }}
                  onMouseEnter={e => e.currentTarget.style.background = C.primaryLight}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                  <div style={{ width: 8, height: 8, borderRadius: '50%', background: typeColor[c.type] || C.primary, marginTop: 5, flexShrink: 0 }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: C.primaryDark, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{c.label}</div>
                    <div style={{ fontSize: 11, color: C.textMuted, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{c.address}</div>
                  </div>
                  {hasCoords ? <Icon name="mapPin" size={12} color={C.success} /> : <Icon name="mapPin" size={12} color={C.border} />}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </>
  );
}

// ── MORE MENU ─────────────────────────────────────────────────────────────────
function MoreMenu({ onNav }) {
  return (
    <div style={{padding:'16px 16px 100px'}}>
      <h2 style={{fontSize:20,color:C.primaryDark,marginBottom:16}}>More</h2>
      {[{id:'calendar',label:'Calendar',icon:'calendar',desc:'Visits, investigations, deliveries'},{id:'reports',label:'Reports',icon:'bar-chart',desc:'Summary counts and monthly overview'},{id:'settings',label:'Settings',icon:'settings',desc:'Profile, zones, post offices, sync'}].map(item=>(
        <Card key={item.id} onClick={()=>onNav(item.id)} style={{display:'flex',alignItems:'center',gap:14,marginBottom:10,padding:'14px 16px'}}>
          <div style={{width:40,height:40,background:C.primaryLight,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon name={item.icon} size={20} color={C.primary}/></div>
          <div><div style={{fontSize:14,fontWeight:600,color:C.primaryDark}}>{item.label}</div><div style={{fontSize:12,color:C.textMuted}}>{item.desc}</div></div>
          <Icon name="chevronRight" size={18} color={C.border} style={{marginLeft:'auto'}}/>
        </Card>
      ))}
    </div>
  );
}

// ── PWA INSTALL BANNER ────────────────────────────────────────────────────────
function InstallBanner() {
  const [prompt,setPrompt]=useState(null);
  useEffect(()=>{const h=e=>{e.preventDefault();setPrompt(e);};window.addEventListener('beforeinstallprompt',h);return()=>window.removeEventListener('beforeinstallprompt',h);},[]);
  if(!prompt) return null;
  return (
    <div onClick={async()=>{prompt.prompt();const r=await prompt.userChoice;if(r.outcome==='accepted')setPrompt(null);}} style={{position:'fixed',bottom:80,left:'50%',transform:'translateX(-50%)',background:C.primary,color:'#fff',padding:'10px 18px',borderRadius:24,fontSize:13,fontWeight:600,cursor:'pointer',boxShadow:`0 4px 16px ${C.primary}44`,zIndex:999,display:'flex',alignItems:'center',gap:8,whiteSpace:'nowrap'}}>
      <Icon name="download" size={16} color="#fff"/> Install SSA Companion
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App() {
  const [state,dispatch]=useReducer(reducer,INIT);
  const [page,setPage]=useState('dashboard');
  const [authLoading,setAuthLoading]=useState(true);
  const {writeOp,syncNow}=useSync(state,dispatch);
  const sd=useSyncDispatch(dispatch,writeOp);

  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{
      if(data.session?.user) dispatch({type:'SET_AUTH',p:data.session.user});
      setAuthLoading(false);
    });
    sb.auth.onAuthStateChange((_,session)=>dispatch({type:'SET_AUTH',p:session?.user||null}));
    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  },[]);

  if(authLoading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16}}><div style={{width:48,height:48,background:C.primaryLight,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="clipboard" size={24} color={C.primary}/></div><p style={{color:C.textMuted,fontSize:14}}>Loading…</p></div>;
  if(!state.authUser) return <AuthScreen onAuth={u=>dispatch({type:'SET_AUTH',p:u})}/>;
  if(!state.profile) return <ProfileSetup authUser={state.authUser} onSave={p=>dispatch({type:'SET_PROFILE',p})}/>;

  const hasSyncBar=!state.online||state.syncPending>0||state.syncing;
  const signOut=async()=>{await sb.auth.signOut();dispatch({type:'SET_AUTH',p:null});dispatch({type:'RESET'});};

  const pages={
    dashboard:<Dashboard state={state} onNav={setPage} onSync={syncNow}/>,
    clients:<ClientsModule state={state} dispatch={sd}/>,
    path:<PathModule state={state} dispatch={sd}/>,
    grants:<GrantsModule state={state} dispatch={sd}/>,
    deliveries:<DeliveriesModule state={state} dispatch={sd}/>,
    map:<MapModule state={state}/>,
    calendar:<CalendarModule state={state}/>,
    reports:<ReportsModule state={state}/>,
    settings:<SettingsModule state={state} dispatch={sd} onSignOut={signOut} syncNow={syncNow}/>,
    more:<MoreMenu onNav={setPage}/>,
  };

  return (
    <div style={{maxWidth:600,margin:'0 auto',minHeight:'100vh',background:C.bg,position:'relative'}}>
      <SyncBar online={state.online} syncPending={state.syncPending} syncing={state.syncing} onSync={syncNow}/>
      <div style={{paddingTop:hasSyncBar?28:0}}>
        <div style={{position:'sticky',top:hasSyncBar?28:0,background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'12px 16px',zIndex:50,display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,background:C.primaryLight,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="clipboard" size={16} color={C.primary}/></div>
          <div style={{flex:1}}><div style={{fontSize:13,fontFamily:"'Sora',sans-serif",fontWeight:700,color:C.primaryDark,lineHeight:1}}>SSA Companion</div><div style={{fontSize:10,color:C.textMuted}}>{state.profile.name} · Zone {state.profile.zone}</div></div>
          <span className="online-dot" style={{background:state.online?C.success:C.danger}} title={state.online?'Online':'Offline'}/>
        </div>
        {pages[page]||pages.dashboard}
      </div>
      <BottomNav active={page} onChange={setPage}/>
      <InstallBanner/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
