// ── INDEXEDDB OFFLINE QUEUE ───────────────────────────────────────────────────
let _idb = null;
function openDB() {
  return new Promise((res, rej) => {
    if (_idb) return res(_idb);
    const r = indexedDB.open('ssa_offline', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('queue', {
      keyPath: 'id',
      autoIncrement: true
    });
    r.onsuccess = e => {
      _idb = e.target.result;
      res(_idb);
    };
    r.onerror = () => rej(r.error);
  });
}
async function enqueue(op) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('queue', 'readwrite');
    tx.objectStore('queue').add({
      ...op,
      ts: Date.now()
    });
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  });
}
async function dequeueAll() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('queue', 'readonly');
    const r = tx.objectStore('queue').getAll();
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function clearQueue() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('queue', 'readwrite');
    tx.objectStore('queue').clear();
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  });
}

// ── SUPABASE HELPERS ──────────────────────────────────────────────────────────
async function sbUpsert(table, row) {
  const {
    error
  } = await sb.from(table).upsert(row, {
    onConflict: 'id'
  });
  if (error) throw error;
}
async function sbDelete(table, id) {
  const {
    error
  } = await sb.from(table).delete().eq('id', id);
  if (error) throw error;
}
async function sbSelect(table, officerId) {
  const {
    data,
    error
  } = await sb.from(table).select('*').eq('officer_id', officerId).order('created_at', {
    ascending: false
  });
  if (error) throw error;
  return data || [];
}
async function sbGetProfile(officerId) {
  const {
    data,
    error
  } = await sb.from('profiles').select('*').eq('officer_id', officerId).maybeSingle();
  if (error) throw error;
  return data || null;
}
async function sbSaveProfile(officerId, profile) {
  const row = {
    officer_id: officerId,
    name: profile.name,
    employee_id: profile.employeeId,
    email: profile.email,
    phone: profile.phone,
    zone: profile.zone,
    zone_name: profile.zoneName,
    parish: profile.parish,
    role: profile.role,
    updated_at: new Date().toISOString()
  };
  const {
    error
  } = await sb.from('profiles').upsert(row, {
    onConflict: 'officer_id'
  });
  if (error) throw error;
}
function profileFromRow(row) {
  if (!row) return null;
  return {
    name: row.name,
    employeeId: row.employee_id,
    email: row.email,
    phone: row.phone,
    zone: row.zone,
    zoneName: row.zone_name,
    parish: row.parish,
    role: row.role
  };
}
async function flushQueue() {
  const ops = await dequeueAll();
  if (!ops.length) return 0;
  for (const op of ops) {
    if (op.action === 'upsert') await sbUpsert(op.table, op.row);else if (op.action === 'delete') await sbDelete(op.table, op.id);else if (op.action === 'profile_upsert') await sbSaveProfile(op.officerId, op.profile);
  }
  await clearQueue();
  return ops.length;
}

// Resolve lat/lng from community name (exact match)
function resolveLatLng(community) {
  const c = ST_THOMAS_COMMUNITIES[community];
  return c ? { lat: c.lat, lng: c.lng } : null;
}

// Fuzzy community lookup — used by the map geocoding effect
function lookupCommunity(address) {
  if (!address) return null;
  const norm = address.toLowerCase().trim();
  // Exact community name match first
  for (const [name, data] of Object.entries(ST_THOMAS_COMMUNITIES)) {
    if (norm.includes(name.toLowerCase())) {
      return { lat: data.lat, lng: data.lng, display: name };
    }
  }
  return null;
}
