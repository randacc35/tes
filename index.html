  return new Promise((res, rej) => {
    if (_idb) return res(_idb);
    const r = indexedDB.open('ssa_offline', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('queue', {
      keyPath: 'id',
      autoIncrement: true
    });
    r.onsuccess = e => {
      _idb = e.target.result;
      res(_idb);
    };
    r.onerror = () => rej(r.error);
  });
}

    const tx = db.transaction('queue', 'readwrite');
    tx.objectStore('queue').add({
      ...op,
      ts: Date.now()
    });
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  });
}

    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function clearQueue() {

    tx.onerror = () => rej(tx.error);
  });

  ssa_post_offices: ['id','officer_id','name','community','lat','lng',
    'created_at','updated_at'],

function sanitiseRow(table, row) {
  const allowed = TABLE_COLUMNS[table];
  if (!allowed) return row;
  const clean = {};
  for (const key of allowed) { if (key in row) clean[key] = row[key]; }
  return clean;
}

async function sbUpsert(table, row) {
  const { error } = await sb.from(table).upsert(sanitiseRow(table, row), { onConflict: 'id' });
  if (error) throw error;
}
async function sbDelete(table, id) {
  const {
    error
  } = await sb.from(table).delete().eq('id', id);
  if (error) throw error;
}
async function sbSelect(table, officerId, cols) {
  const { data, error } = await sb.from(table)
    .select(cols || '*')
    .eq('officer_id', officerId)
    .order('created_at', { ascending: false });
  if (error) throw error;
  return data || [];
}
async function sbGetProfile(officerId) {
  const {
    data,
    error
  } = await sb.from('profiles').select('*').eq('officer_id', officerId).maybeSingle();
  if (error) throw error;
  return data || null;
}
async function sbSaveProfile(officerId, profile) {
  const row = {
    officer_id: officerId,
    name: profile.name,
    employee_id: profile.employeeId,
    email: profile.email,
    phone: profile.phone,
    zone: profile.zone,
    zone_name: profile.zoneName,
    parish: profile.parish,
    role: profile.role,
    updated_at: new Date().toISOString()
  };
  const {
    error
  } = await sb.from('profiles').upsert(row, {
    onConflict: 'officer_id'
  });
  if (error) throw error;
}
function profileFromRow(row) {
  if (!row) return null;
  return {
    name: row.name,
    employeeId: row.employee_id,
    email: row.email,
    phone: row.phone,
    zone: row.zone,
    zoneName: row.zone_name,
    parish: row.parish,
    role: row.role
  };
}
async function flushQueue() {
  const ops = await dequeueAll();
  if (!ops.length) return 0;
  const failed = [];
  for (const op of ops) {
    try {
      if (op.action === 'upsert') await sbUpsert(op.table, op.row);
      else if (op.action === 'delete') await sbDelete(op.table, op.id);
      else if (op.action === 'profile_upsert') await sbSaveProfile(op.officerId, op.profile);
    } catch(e) {
      // Track retry count; discard after 5 attempts to stop infinite loops
      const retries = (op._retries || 0) + 1;

  await clearQueue();
  // Re-enqueue only the ops that failed and haven't hit the retry limit
  for (const op of failed) await enqueue(op);
  return ops.length - failed.length;
}
